<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">ROOMMATES 基本2LDK間取り図</title>
  <desc id="desc">北側にHaruとAoiの個室、玄関、洗面所、浴室、中央に廊下、南側にキッチン、ダイニング、リビング、最南部にバルコニーを配置した間取り。</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#665B52" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#342E2A" flood-opacity="0.18"/>
    </filter>
    <style>
      .label { font-family: "Noto Sans JP", "Yu Gothic", sans-serif; fill: #302A27; font-weight: 700; text-anchor: middle; }
      .sub { font-family: "Noto Sans JP", "Yu Gothic", sans-serif; fill: #625750; font-size: 15px; text-anchor: middle; }
      .room { stroke: #51463F; stroke-width: 5; }
      .zone { stroke: #8C7B70; stroke-width: 2; stroke-dasharray: 8 8; }
      .door { stroke: #F8F2E8; stroke-width: 10; }
      .door-line { stroke: #6F625A; stroke-width: 3; fill: none; }
      .fixture { fill: #FFFDF8; stroke: #7B6D64; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1200" height="900" fill="#F6F0E7"/>
  <text x="600" y="52" class="label" font-size="30">ROOMMATES 基本間取り — 2LDK</text>
  <text x="600" y="80" class="sub">北 ↑　24 × 16タイル + バルコニー　1タイル = 0.4m</text>

  <g transform="translate(120 110)" filter="url(#shadow)">
    <!-- Rooms: 1 logical tile = 40 SVG units -->
    <rect x="0" y="0" width="320" height="240" rx="4" fill="#DDE8DA" class="room"/>
    <rect x="320" y="0" width="320" height="240" rx="4" fill="#E6DCEB" class="room"/>
    <rect x="640" y="0" width="120" height="120" rx="4" fill="#F0E2C7" class="room"/>
    <rect x="760" y="0" width="200" height="120" rx="4" fill="#D9E8E7" class="room"/>
    <path d="M640 120 H760 V240 H0 V320 H760 V120" fill="#E8E2D9" class="room"/>
    <rect x="760" y="120" width="200" height="200" rx="4" fill="#D6E4EA" class="room"/>
    <rect x="0" y="320" width="960" height="320" rx="4" fill="#F1DFC7" class="room"/>
    <rect x="0" y="640" width="960" height="80" rx="4" fill="#DCE7CF" class="room"/>
    <rect x="0" y="0" width="960" height="720" fill="url(#grid)" pointer-events="none"/>

    <!-- LDK zones -->
    <rect x="0" y="320" width="280" height="320" fill="#EFCFAF" fill-opacity="0.55" class="zone"/>
    <rect x="280" y="320" width="280" height="320" fill="#F4E4C9" fill-opacity="0.55" class="zone"/>
    <rect x="560" y="320" width="400" height="320" fill="#E5D6BF" fill-opacity="0.55" class="zone"/>

    <!-- Labels -->
    <text x="160" y="93" class="label" font-size="24">Haruの個室</text>
    <text x="160" y="120" class="sub">PRIVATE / 8 × 6</text>
    <text x="480" y="93" class="label" font-size="24">Aoiの個室</text>
    <text x="480" y="120" class="sub">PRIVATE / 8 × 6</text>
    <text x="700" y="49" class="label" font-size="22">玄関</text>
    <text x="700" y="75" class="sub">3 × 3</text>
    <text x="860" y="108" class="label" font-size="19">洗面所 5 × 3</text>
    <text x="440" y="286" class="label" font-size="22">廊下</text>
    <text x="860" y="306" class="label" font-size="19">浴室 5 × 5 / 1人</text>
    <text x="140" y="420" class="label" font-size="24">キッチン</text>
    <text x="140" y="447" class="sub">COOKING</text>
    <text x="420" y="590" class="label" font-size="24">ダイニング</text>
    <text x="420" y="617" class="sub">EATING / TALK</text>
    <text x="760" y="590" class="label" font-size="24">リビング</text>
    <text x="760" y="617" class="sub">MOVIE / TALK / RELAX</text>
    <text x="480" y="688" class="label" font-size="23">バルコニー</text>

    <!-- Fixed fixtures -->
    <rect x="20" y="340" width="240" height="64" rx="8" class="fixture"/>
    <circle cx="72" cy="372" r="18" fill="#BFD7D5" stroke="#7B6D64" stroke-width="2"/>
    <rect x="110" y="352" width="46" height="40" rx="5" fill="#D3D0CA" stroke="#7B6D64" stroke-width="2"/>
    <text x="198" y="378" class="sub">固定キッチン</text>

    <rect x="335" y="425" width="170" height="105" rx="10" class="fixture"/>
    <rect x="350" y="395" width="58" height="28" rx="8" class="fixture"/>
    <rect x="432" y="395" width="58" height="28" rx="8" class="fixture"/>
    <rect x="350" y="532" width="58" height="28" rx="8" class="fixture"/>
    <rect x="432" y="532" width="58" height="28" rx="8" class="fixture"/>

    <rect x="675" y="365" width="220" height="68" rx="18" fill="#C9B8A4" stroke="#7B6D64" stroke-width="2"/>
    <rect x="710" y="485" width="150" height="62" rx="10" class="fixture"/>
    <rect x="910" y="420" width="18" height="150" rx="4" fill="#6B625E"/>

    <rect x="800" y="136" width="125" height="145" rx="18" fill="#F7FBFC" stroke="#7B6D64" stroke-width="2"/>
    <path d="M822 160 H903 V255 H822 Z" fill="#BFD7DF" stroke="#7B6D64" stroke-width="2"/>

    <rect x="790" y="15" width="65" height="38" rx="6" class="fixture"/>
    <circle cx="822" cy="34" r="10" fill="#BFD7D5"/>
    <rect x="875" y="15" width="55" height="78" rx="6" class="fixture"/>

    <!-- Doors / openings -->
    <path d="M200 235 H270" class="door"/>
    <path d="M520 235 H590" class="door"/>
    <path d="M635 175 V225" class="door"/>
    <path d="M755 44 V98" class="door"/>
    <path d="M755 182 V238" class="door"/>
    <path d="M655 315 H735" class="door"/>
    <path d="M785 635 H920" stroke="#F6F0E7" stroke-width="12"/>

    <!-- Entrance and balcony direction -->
    <path d="M680 -18 V24" class="door-line"/>
    <path d="M668 9 L680 24 L692 9" class="door-line"/>
    <text x="700" y="-24" class="sub">外部</text>
    <path d="M850 608 V672" class="door-line"/>
    <path d="M838 657 L850 672 L862 657" class="door-line"/>

    <!-- Character pair anchor examples -->
    <g fill="#C9775A" stroke="#FFFFFF" stroke-width="3">
      <circle cx="680" cy="520" r="18"/>
      <circle cx="725" cy="520" r="18"/>
    </g>
    <text x="702" y="563" class="sub">2人配置アンカー</text>
  </g>

  <g transform="translate(120 855)">
    <rect x="0" y="-20" width="22" height="22" fill="#E8E2D9" stroke="#51463F"/>
    <text x="34" y="-3" font-family="Noto Sans JP, Yu Gothic, sans-serif" font-size="15" fill="#625750">移動用の廊下</text>
    <circle cx="185" cy="-9" r="10" fill="#C9775A"/>
    <text x="205" y="-3" font-family="Noto Sans JP, Yu Gothic, sans-serif" font-size="15" fill="#625750">キャラクター配置例</text>
    <line x1="405" y1="-9" x2="455" y2="-9" stroke="#8C7B70" stroke-width="2" stroke-dasharray="8 8"/>
    <text x="468" y="-3" font-family="Noto Sans JP, Yu Gothic, sans-serif" font-size="15" fill="#625750">LDK内のゾーン境界（壁なし）</text>
  </g>
</svg>
